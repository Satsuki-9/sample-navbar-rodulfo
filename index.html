<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Navbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand me-auto" href="#">
                Logo
            </a>
            <button class="navbar-toggler shadow-none"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="offcanvas offcanvas-end"
                 tabindex="-1"
                 id="offcanvasNavbar">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">
                        Logo
                    </h5>
                    <button class="btn-close"
                            data-bs-dismiss="offcanvas">
                    </button>
                </div>

                <div class="offcanvas-body">

                    <ul class="navbar-nav justify-content-center flex-grow-1">

                        <li class="nav-item">
                            <a class="nav-link active mx-lg-2" href="#">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="#">About</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="#">Services</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="#">Portfolio</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="#">Contact</a>
                        </li>
                    </ul>

                    <a href="#" class="login-button">
                        Login
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-overlay">
            <div class="container hero-content">
                <h1>Welcome.</h1>
                <p>
                    Made with Bootstrap 5 :)
                </p>
                <a href="#" class="btn btn-success px-4 py-2">
                    Learn More
                </a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
